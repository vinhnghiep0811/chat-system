services:
  db:
    image: postgres:16
    container_name: chat_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - chat_pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: chat_api
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  chat_pgdata:
